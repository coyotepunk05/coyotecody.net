<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status</title>
    <link rel="stylesheet" type="text/css" href="./style.css?nocache123">
</head>
<body>
    <p id="Jellyfin Status"></p>
    <script>
        const statusEl = document.getElementById('status');
        const img = new Image();
        
        // --- GIF URLs ---
        const successGifUrl = 'https://media.discordapp.net/attachments/883081538596642826/1375096957374038186/attachment.gif?ex=699e4a96&is=699cf916&hm=1b20a62f86f3112f9d53b94dafda068fb6e7974a83826c953789ab2941323407&=&width=206&height=421';
        const failureGifUrl = 'https://media.discordapp.net/attachments/883081538596642826/1374210725496488017/attachment.gif?ex=699e5cf8&is=699d0b78&hm=20a6a0749ce9124bf606b14c9bf7983c77937ea53e78ef2f1f77c646c18d458f&=&width=263&height=535';
        
        // Function to display a GIF
        function displayGif(gifUrl, altText) {
            // Clear any existing content
            statusEl.textContent = ''; 
            
            const gif = document.createElement('img');
            gif.src = gifUrl;
            gif.alt = altText;
            
            // Append the new image element to the status container
            statusEl.appendChild(gif);
        }

        // --- Event Handlers ---
        
        // On success (image loads)
        img.onload = () => {
            // displayGif(successGifUrl, 'Jellyfin is working: jelly flourish');
            // If you want to keep the text 'jelly flourish' as well:
            statusEl.textContent = 'jelly flourish';
            displayGif(successGifUrl, 'Jellyfin is working');
        };
        
        // On failure (image fails to load)
        img.onerror = () => {
            // displayGif(failureGifUrl, 'Jellyfin is down: jellykill');
            // If you want to keep the text 'jellykill' as well:
            statusEl.textContent = 'jellykill';
            displayGif(failureGifUrl, 'Jellyfin is down');
        };
        
        // Start the check by loading the Jellyfin banner image
        // The Date.now() query parameter is used to prevent browser caching.
        img.src = 'https://jellyfin.olgi.net/web/banner-light.b113d4d1c6c07fcb73f0.png?' + Date.now();
    </script>
    <button class="button" onclick="location.href='./index.html'">mmmmrowww (back)</button>
</body>
</html>
